plant_name: solar_wind_plant
output_dir: output
data:
  solar_path: data/Solar_2025-01-01_data_.csv
  wind_path: data/Wind_2025_01-01_data_.csv
preprocessing:
  frequency: 1m
  gap_fill: zero
  max_interpolation_gap_minutes: 15
  align_to_full_year: true
  simulation_dtype: float64
grid:
  export_limit_kw: 400.0
  import_limit_kw: ''
load:
  output_profile_kw: 400.0
  aux_consumption_kw: 20.0
battery:
  nominal_power_kw: 500.0
  duration_hours: 2.0
  initial_soc_fraction: 0.5
  degradation_per_cycle: 0.0002739726027
  charge_efficiency: 0.96
  discharge_efficiency: 0.94
  charge_loss_table:
    0.2: 0.04
    0.3: 0.045
    0.5: 0.07
    1.0: 0.11
    1.2: 0.14
  discharge_loss_table:
    0.2: 0.023
    0.3: 0.032
    0.5: 0.042
    1.0: 0.062
    1.2: 0.067
  min_soc_fraction: 0.0
  max_soc_fraction: 1.0
# Optional: battery sizing sweep (run with --mode size)
sizing:
  enabled: true
  capacities_kwh: [500, 750, 1000, 1250, 1500]
  objective: min_grid_import_then_smallest
  constraints:
    min_self_consumption_pct: 90.0  # "not miss 90% profile" - 90% self-consumption target
    max_cycles_per_year: null       # optional degradation cap
