services:
  - type: web
    name: bess-model
    env: python
    plan: free
    buildCommand: "pip install -e ."
    startCommand: "gunicorn wsgi:app --workers 1 --threads 1 --timeout 180"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.2
      - key: FLASK_ENV
        value: production
      - key: PORT
        value: 10000
